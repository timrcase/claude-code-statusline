name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      # Pure Go, no cgo, so darwin+linux/amd64+arm64 all cross-compile from
      # this one Linux runner — see scripts/build-release.sh.
      - name: Build release binaries
        run: scripts/build-release.sh

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/*.tar.gz dist/checksums.txt \
            --title "${{ github.ref_name }}" \
            --generate-notes

  # Render the Homebrew formula from this release's checksums and push it to
  # the timrcase/homebrew-tap repo, so `brew install timrcase/tap/...` tracks
  # every tagged release. Requires a HOMEBREW_TAP_TOKEN secret (a PAT or
  # fine-grained token with contents:write on homebrew-tap); the default
  # GITHUB_TOKEN cannot push to another repo.
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: timrcase/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern checksums.txt --dir . --clobber
          mkdir -p tap/Formula
          scripts/render-formula.sh "$version" checksums.txt \
            > tap/Formula/claude-code-statusline.rb

      - name: Commit and push to tap
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-code-statusline.rb
          # --cached so a brand-new (untracked) formula still counts as a change;
          # plain `git diff` ignores untracked files and would skip the push.
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "claude-code-statusline ${{ github.ref_name }}"
          git push

  # Bump the plugin manifest's version to this release on the default branch.
  # The plugin is served from `master` (that's what `claude plugin marketplace
  # add` clones), and its SessionStart sync hook downloads the release matching
  # plugin.json's version — so this keeps the Claude Code plugin tracking every
  # tagged release without a manual bump. The tag's own commit is irrelevant to
  # plugin resolution; only the default branch's manifest is.
  plugin-version:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Bump plugin.json version and push
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          manifest="plugin/.claude-plugin/plugin.json"
          tmp="$(mktemp)"
          jq --arg v "$version" '.version = $v' "$manifest" > "$tmp"
          mv "$tmp" "$manifest"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$manifest"
          if git diff --cached --quiet; then
            echo "plugin.json already at $version; nothing to commit."
            exit 0
          fi
          git commit -m "chore: bump plugin version to $version"
          git push
